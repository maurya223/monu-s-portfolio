<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monu Maurya - Web & Python Developer</title>
  <meta name="description" content="Portfolio of Monu Maurya, a Web & Python Developer from New Delhi, India">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  {% load static %}
  <style>
    :root {
      --bg-color: #111418;
      --secondary-bg: #283039;
      --text-color: #ffffff;
      --secondary-text: #9cabba;
      --accent-color: #3d99f5;
      --border-color: #3b4754;
      --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }

    [data-theme="light"] {
      --bg-color: #f5f7fa;
      --secondary-bg: #e1e5eb;
      --text-color: #111418;
      --secondary-text: #4a5568;
      --border-color: #cbd5e0;
      --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Manrope', 'Noto Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      transition: var(--transition);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header Styles */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: var(--bg-color);
      border-bottom: 1px solid var(--border-color);
      z-index: 1000;
      padding: 1rem 0;
      transition: var(--transition);
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 1.5rem;
      height: 1.5rem;
      color: var(--accent-color);
    }

    .logo-text {
      font-weight: 700;
      color: var(--text-color);
      font-size: 1.25rem;
    }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 1.5rem;
      cursor: pointer;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-color);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: var(--transition);
      padding: 0.5rem 0;
      position: relative;
    }

    .nav-links a:hover {
      color: var(--accent-color);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background-color: var(--accent-color);
      transition: var(--transition);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .theme-toggle {
      background: var(--secondary-bg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-color);
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      color: var(--accent-color);
    }

    .theme-icon {
      width: 1.25rem;
      height: 1.25rem;
    }

    .profile-pic {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background-image: url("{% static 'images/Monu.png' %}");
      background-size: cover;
      background-position: center;
      border: 3px solid var(--accent-color);
      box-shadow: 0 4px 12px rgba(61, 153, 245, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .profile-pic:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(61, 153, 245, 0.5);
      border-color: #5ba3f5;
    }

    @media (max-width: 768px) {
      .profile-pic {
        width: 2.5rem;
        height: 2.5rem;
        border-width: 2px;
      }
    }

    @media (max-width: 576px) {
      .profile-pic {
        width: 2rem;
        height: 2rem;
        border-width: 2px;
      }
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(17, 20, 24, 0.92) 0%, rgba(30, 45, 65, 0.85) 100%);
      z-index: 1;
    }

    /* Floating Particles Background */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent-color);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 15s infinite;
    }

    .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 12s; }
    .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; }
    .particle:nth-child(3) { left: 35%; top: 40%; animation-delay: 4s; animation-duration: 14s; }
    .particle:nth-child(4) { left: 50%; top: 60%; animation-delay: 1s; animation-duration: 16s; }
    .particle:nth-child(5) { left: 65%; top: 30%; animation-delay: 3s; animation-duration: 20s; }
    .particle:nth-child(6) { left: 80%; top: 70%; animation-delay: 5s; animation-duration: 13s; }
    .particle:nth-child(7) { left: 90%; top: 15%; animation-delay: 2.5s; animation-duration: 17s; }
    .particle:nth-child(8) { left: 5%; top: 50%; animation-delay: 1.5s; animation-duration: 15s; }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
        opacity: 0.3;
      }
      25% {
        transform: translateY(-30px) translateX(15px);
        opacity: 0.6;
      }
      50% {
        transform: translateY(-15px) translateX(-10px);
        opacity: 0.4;
      }
      75% {
        transform: translateY(-40px) translateX(20px);
        opacity: 0.5;
      }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    /* Greeting Animation */
    .greeting {
      display: inline-block;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--accent-color);
      margin-bottom: 0.5rem;
      animation: fadeInUp 0.8s ease forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Name Animation */
    .name {
      display: block;
      background: linear-gradient(90deg, #ffffff, var(--accent-color), #ffffff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite, fadeInUp 0.8s ease 0.2s forwards;
      opacity: 0;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* Animated Role Text with Gradient */
    .role-wrapper {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      min-width: 280px;
      margin-top: 0.5rem;
    }

    .role-list {
      list-style: none;
      padding: 0;
      margin: 0;
      position: relative;
      height: 50px;
    }

    .role-list li {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      align-items: center;
      opacity: 0;
      transform: translateY(100%);
      animation: roleRotate 10s infinite;
    }

    .role-list li span {
      background: linear-gradient(90deg, var(--accent-color), #5ba3f5, #00d4ff, var(--accent-color));
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .role-list li:nth-child(1) { animation-delay: 0s; }
    .role-list li:nth-child(2) { animation-delay: 2s; }
    .role-list li:nth-child(3) { animation-delay: 4s; }
    .role-list li:nth-child(4) { animation-delay: 6s; }
    .role-list li:nth-child(5) { animation-delay: 8s; }

    @keyframes roleRotate {
      0%, 5% {
        opacity: 0;
        transform: translateY(100%);
      }
      10%, 30% {
        opacity: 1;
        transform: translateY(0);
      }
      35%, 100% {
        opacity: 0;
        transform: translateY(-100%);
      }
    }

    .hero p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      margin-bottom: 2rem;
      max-width: 600px;
      color: var(--secondary-text);
      animation: fadeInUp 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Button Styles with Enhanced Effects */
    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease 0.6s forwards;
      opacity: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.875rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-color), #5ba3f5);
      color: white;
      box-shadow: 0 4px 15px rgba(61, 153, 245, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(61, 153, 245, 0.5);
    }

    .btn-outline {
      background-color: transparent;
      color: var(--accent-color);
      border: 2px solid var(--accent-color);
    }

    .btn-outline:hover {
      background-color: var(--accent-color);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(61, 153, 245, 0.3);
    }

    /* Scroll Indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--secondary-text);
      font-size: 0.875rem;
      animation: fadeInUp 0.8s ease 0.8s forwards, bounce 2s ease-in-out 1.5s infinite;
      opacity: 0;
    }

    .scroll-indicator span {
      width: 26px;
      height: 44px;
      border: 2px solid var(--secondary-text);
      border-radius: 20px;
      position: relative;
    }

    .scroll-indicator span::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 8px;
      background: var(--accent-color);
      border-radius: 2px;
      animation: scrollMouse 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    @keyframes scrollMouse {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(12px); }
    }

    /* Glow Effect for Hero */
    .hero-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(61, 153, 245, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      right: -100px;
      transform: translateY(-50%);
      z-index: 1;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.5; }
      50% { transform: translateY(-50%) scale(1.2); opacity: 0.8; }
    }

    /* Section Styles */
    section {
      padding: 5rem 0;
    }

    .section-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      margin-bottom: 2.5rem;
      position: relative;
      display: inline-block;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -0.5rem;
      left: 0;
      width: 50px;
      height: 3px;
      background-color: var(--accent-color);
    }

    /* About Section */
    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }

    .about-text p {
      margin-bottom: 1.5rem;
      color: var(--secondary-text);
    }

    .about-image {
      position: relative;
      border-radius: 0.5rem;
      height: 300px;
      width: 300px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px auto;
    }

    .about-image img {
      width: 300px; 
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }

    .about-image img:hover {
      transform: scale(1.05);
    }

    /* Skills Section */
    .skills-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }

    .skill-card {
      background-color: var(--secondary-bg);
      padding: 1.5rem;
      border-radius: 0.5rem;
      text-align: center;
      transition: var(--transition);
    }

    .skill-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--card-shadow);
    }

    .skill-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--accent-color);
    }

    .skill-name {
      font-weight: 600;
    }

    /* Experience Section */
    .timeline {
      position: relative;
      padding-left: 3rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 1.5rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: var(--border-color);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .timeline-dot {
      position: absolute;
      left: -3rem;
      top: 0;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timeline-dot-inner {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background-color: var(--accent-color);
      border: 3px solid var(--secondary-bg);
    }

    .timeline-content {
      background-color: var(--secondary-bg);
      padding: 1.5rem;
      border-radius: 0.5rem;
      box-shadow: var(--card-shadow);
    }

    .timeline-date {
      color: var(--accent-color);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .timeline-title {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }

    /* Projects Section */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .project-card {
      background-color: var(--secondary-bg);
      border-radius: 0.5rem;
      overflow: hidden;
      transition: var(--transition);
      box-shadow: var(--card-shadow);
    }

    .project-card:hover {
      transform: translateY(-10px);
    }

    .project-image {
      height: 200px;
      overflow: hidden;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .project-card:hover .project-image img {
      transform: scale(1.05);
    }

    .project-info {
      padding: 1.5rem;
    }

    .project-title {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .project-description {
      color: var(--secondary-text);
      margin-bottom: 1.5rem;
    }

    .project-links {
      display: flex;
      gap: 1rem;
    }

    /* Testimonials Section */
    .testimonials-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .testimonial-card {
      background-color: var(--secondary-bg);
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: var(--card-shadow);
    }

    .testimonial-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .testimonial-avatar {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background-color: var(--border-color);
      overflow: hidden;
    }

    .testimonial-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .testimonial-author {
      font-weight: 600;
    }

    .testimonial-position {
      color: var(--secondary-text);
      font-size: 0.875rem;
    }

    .testimonial-rating {
      color: gold;
      margin-bottom: 1rem;
    }

    .testimonial-text {
      font-style: italic;
      color: var(--secondary-text);
    }

    /* Contact Section */
    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .contact-icon {
      width: 3rem;
      height: 3rem;
      background-color: var(--secondary-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-color);
      font-size: 1.25rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-control {
      width: 100%;
      padding: 1rem;
      background-color: var(--secondary-bg);
      border: none;
      border-radius: 0.5rem;
      color: var(--text-color);
      font-family: inherit;
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--accent-color);
    }

    textarea.form-control {
      min-height:
